{% extends "base.html" %}
{% block content %}
<input type="hidden" id="product_view_mode" value="{{ view_mode or 'self_made' }}">
<div class="card">
  <div class="filters">
    <input id="p_name" placeholder="按产品名称搜索">
    <input id="p_model" placeholder="按型号搜索">
    <select id="p_category"></select>
    <button class="btn primary" onclick="openProductModal()">新增产品</button>
  </div>
</div>
<div id="msg" class="msg"></div>
<div class="card">
  <div class="list-total"><span id="product-record-total">共 0 条记录</span></div>
  <table id="products-table">
    <thead>
      <tr>
        <th>产品编码</th><th>产品名称</th><th>产品类型</th><th>产品类别</th><th>型号</th><th>规格/图号</th>
        <th>成本</th><th>含税售价</th><th>库存数量</th><th>安全库存</th><th>备注</th><th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="product-modal" class="modal hidden">
  <div class="modal-body">
    <h3 id="product-modal-title">新增产品</h3>
    <form id="product-form" class="form-grid">
      <input type="hidden" id="pd_id">
      <label>产品编码<input id="pd_product_code" placeholder="手工输入编码" required></label>
      <label>产品名称<input id="pd_product_name" required></label>
      <label>产品类型
        <select id="pd_product_type" onchange="onProductTypeChange()">
          <option value="self_made">自产品</option>
          <option value="purchased">外购品</option>
        </select>
      </label>
      <label>产品类别
        <select id="pd_product_category"></select>
      </label>
      <label>型号<input id="pd_model_no"></label>
      <label class="full">规格/图号<textarea id="pd_spec_drawing" rows="2"></textarea></label>
      <label id="pd_linked_material_label">关联物料（外购品成本来源）
        <select id="pd_linked_material_id"></select>
      </label>
      <label>含税售价<input id="pd_sale_price_with_tax" type="number" step="0.01" value="0"></label>
      <label>库存数量<input id="pd_current_stock" type="number" step="0.001" value="0"></label>
      <label>安全库存<input id="pd_safety_stock" type="number" step="0.001" value="0"></label>
      <label>状态
        <select id="pd_is_active">
          <option value="true">启用</option>
          <option value="false">停用</option>
        </select>
      </label>
      <label class="full">备注<textarea id="pd_remark" rows="2"></textarea></label>
    </form>
    <div class="btn-row">
      <button class="btn primary" onclick="saveProduct()">保存</button>
      <button class="btn" onclick="closeProductModal()">取消</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/static/js/products.js"></script>
{% endblock %}
