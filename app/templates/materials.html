{% extends "base.html" %}
{% block content %}
<input type="hidden" id="view_mode" value="{{ view_mode or 'all' }}">
<div class="card">
  <div class="filters">
    <input id="f_code" placeholder="按物料编码搜索">
    <input id="f_name" placeholder="按名称搜索">
    <select id="f_category"></select>
    <select id="f_part_type">
      <option value="">全部类型</option>
      <option value="standard">标准件</option>
      <option value="custom">自制件</option>
      <option value="assembly">装配件</option>
    </select>
    <select id="f_status">
      <option value="">全部编辑状态</option>
      <option value="draft">草稿</option>
      <option value="released">已发布</option>
    </select>
    <button class="btn primary" onclick="openMaterialModal()">新增物料</button>
    <a class="btn" href="/export/materials?view={{ view_mode or 'all' }}">导出 Excel</a>
    <input type="file" id="material-import-file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" class="hidden">
    <button type="button" class="btn" id="material-import-btn">导入 Excel</button>
    <a class="btn" href="/import/materials/template">下载导入模板</a>
  </div>
</div>

<div id="msg" class="msg"></div>

<div class="card materials-table-card">
  <div class="card-title-row materials-batch-bar">
    <div class="filters" style="margin:0">
      <button type="button" class="btn" id="material-batch-toggle">表格内编辑</button>
      <button type="button" class="btn primary hidden" id="material-batch-save">保存修改</button>
      <button type="button" class="btn hidden" id="material-batch-cancel">取消</button>
    </div>
    <span id="materials-record-total" class="list-total-edge">共 0 条记录</span>
  </div>
  <table id="materials-table">
    <colgroup>
      <col class="mc-code"><col class="mc-name"><col class="mc-rev"><col class="mc-spec">
      <col class="mc-unit"><col class="mc-cat"><col class="mc-ptype"><col class="mc-usage"><col class="mc-mat"><col class="mc-grade">
      <col class="mc-supplier"><col class="mc-link"><col class="mc-status"><col class="mc-active">
      <col class="mc-stock"><col class="mc-safe"><col class="mc-price"><col class="mc-tax"><col class="mc-remark"><col class="mc-actions">
    </colgroup>
    <thead>
      <tr>
        <th>编码</th><th>名称</th><th>当前版本</th><th>规格/图号</th><th>单位</th><th>物料分类</th><th>类型</th>
        <th>用途</th><th>材质</th><th>等级</th>
        <th>默认供应商</th><th>采购链接</th><th>编辑状态</th><th>启用状态</th><th>当前库存</th><th>安全库存</th><th>单价</th><th>税率</th><th>备注</th><th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="material-modal" class="modal hidden">
  <div class="modal-body">
    <h3 id="material-modal-title">新增物料</h3>
    <form id="material-form" class="form-grid">
      <input type="hidden" id="m_id">
      <label>编码<input id="m_code" placeholder="保存后自动生成" readonly></label>
      <label>名称<input id="m_name" required></label>
      <label class="full">规格/图号<textarea id="m_spec_draw" rows="2" placeholder="第一行：规格；第二行：图号（可选）"></textarea></label>
      <label>单位
        <select id="m_unit"></select>
      </label>
      <label>物料分类
        <select id="m_category" onchange="refreshSupplierOptions()">
          <option value="">请选择物料分类</option>
        </select>
      </label>
      <label>类型
        <select id="m_part_type">
          <option value="standard">标准件</option>
          <option value="custom">自制件</option>
          <option value="assembly">装配件</option>
        </select>
      </label>
      <label>默认供应商
        <select id="m_default_supplier"></select>
      </label>
      <label>税率
        <select id="m_tax_rate"></select>
      </label>
      <label>采购链接<input id="m_purchase_link" placeholder="https://..."></label>
      <label>用途<input id="m_usage"></label>
      <label>材质
        <select id="m_material_name_attr"></select>
      </label>
      <label>等级
        <select id="m_grade_attr"></select>
      </label>
      <label>单价<input id="m_unit_price" type="number" step="0.01" value="0"></label>
      <label>安全库存<input id="m_safety_stock" type="number" step="0.01" value="0"></label>
      <label>当前库存<input id="m_current_stock" type="number" step="0.01" value="0"></label>
      <label>当前版本<input id="m_current_revision"></label>
      <label>编辑状态
        <select id="m_status">
          <option value="draft">草稿</option>
          <option value="released">已发布</option>
        </select>
      </label>
      <label class="full">备注<textarea id="m_remark" rows="2"></textarea></label>
    </form>
    <div class="btn-row">
      <button class="btn primary" onclick="saveMaterial()">保存</button>
      <button class="btn" onclick="closeMaterialModal()">取消</button>
    </div>
  </div>
</div>

<script src="/static/js/materials.js?v=20260410-3"></script>
{% endblock %}
