{% extends "base.html" %}
{% block content %}
<div id="msg" class="msg"></div>
<div class="card">
  <p class="muted-hint">在列表中点击<strong>加载明细</strong>，在弹出窗口中填写「本次入库」并确认。仅当明细上<strong>仍有待入库数量</strong>时才会出现该按钮（已全部收齐的订单不会出现，避免重复入库）。</p>
  <div class="filters">
    <span id="pr_total" class="list-total-edge">共 0 条</span>
  </div>
  <div class="po-lines-wrap" style="max-height: none;">
    <table class="po-lines-table">
      <thead>
        <tr>
          <th>订单号</th><th>日期</th><th>供方</th><th>状态</th><th>含税合计</th><th>待入库概况</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="pr_order_tbody"></tbody>
    </table>
  </div>
</div>

<div id="pr_modal" class="modal hidden">
  <div class="modal-body po-modal-wide">
    <h3 id="pr_title" style="margin-top:0"></h3>
    <p id="pr_meta" class="muted-hint"></p>
    <div class="po-lines-wrap" style="max-height: min(55vh, 480px);">
      <table class="po-lines-table">
        <thead>
          <tr>
            <th>行号</th><th>料号</th><th>名称</th><th>单位</th><th>订购</th><th>已入库</th><th>待入库</th><th>本次入库</th>
          </tr>
        </thead>
        <tbody id="pr_tbody"></tbody>
      </table>
    </div>
    <div class="btn-row" style="margin-top:1rem">
      <button type="button" class="btn primary" id="pr_submit">确认本次入库</button>
      <button type="button" class="btn" id="pr_close">关闭</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/static/js/purchase_receipts.js"></script>
{% endblock %}
