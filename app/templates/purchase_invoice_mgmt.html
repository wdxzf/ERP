{% extends "base.html" %}
{% block content %}
<div id="msg" class="msg"></div>
<div class="card">
  <p class="muted-hint">按订单管理进项发票：列表展示<strong>开票状态</strong>；在「操作」中<strong>查看发票记录</strong>（下载、删除）或<strong>新增发票</strong>（须上传电子版）。一张订单可对应多张发票。</p>
  <div class="filters">
    <span id="pi_total" class="list-total-edge">共 0 条</span>
  </div>
  <div class="po-lines-wrap" style="max-height: none;">
    <table class="po-lines-table">
      <thead>
        <tr>
          <th>订单号</th><th>日期</th><th>供方</th><th>单据状态</th><th>含税合计</th><th>开票状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="pi_order_tbody"></tbody>
    </table>
  </div>
</div>

<div id="pi_modal" class="modal hidden">
  <div class="modal-body po-modal-wide">
    <h3 id="pi_modal_title" style="margin-top:0"></h3>
    <p id="pi_modal_meta" class="muted-hint"></p>

    <h4 id="pi_section_list">已登记发票</h4>
    <div class="po-lines-wrap" style="max-height: min(40vh, 320px);">
      <ul id="pi_modal_list" class="po-invoice-list"></ul>
    </div>

    <h4 id="pi_section_add" style="margin-top:1rem">新增发票</h4>
    <p class="muted-hint">电子文件必填；支持 PDF、PNG、JPG、JPEG、OFD。</p>
    <div class="form-grid">
      <label>发票号码<input id="pi_inv_no" placeholder="必填"></label>
      <label>含税金额（可选）<input id="pi_inv_amt" type="number" step="0.01" placeholder="便于与订单核对"></label>
      <label class="full">备注<input id="pi_inv_remark"></label>
      <label class="full">电子文件（必填）
        <input id="pi_inv_file" type="file" accept=".pdf,.png,.jpg,.jpeg,.ofd,application/pdf,image/*">
      </label>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button type="button" class="btn primary" id="pi_upload">上传保存</button>
      <button type="button" class="btn" id="pi_close">关闭</button>
    </div>
  </div>
</div>
<script src="/static/js/purchase_invoice_mgmt.js"></script>
{% endblock %}
