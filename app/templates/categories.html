{% extends "base.html" %}
{% block content %}
<div class="card categories-controls-card categories-controls-card-compact">
  <div class="page-section-intro categories-intro">
    <div>
      <div class="section-eyebrow">基础数据</div>
      <div class="page-section-title-row">
        <h2 class="page-section-title">基础数据管理</h2>
        <span id="cat-type-badge" class="page-type-badge">元件分类</span>
      </div>
    </div>
    <div class="summary-inline summary-inline-compact categories-summary-strip">
      <span class="summary-chip summary-chip-compact">
        <span class="summary-chip-label">总数</span>
        <span id="cat-total-stat" class="summary-chip-value">0</span>
      </span>
      <span class="summary-chip summary-chip-compact">
        <span class="summary-chip-label">启用</span>
        <span id="cat-active-stat" class="summary-chip-value">0</span>
      </span>
      <span class="summary-chip summary-chip-compact">
        <span class="summary-chip-label">停用</span>
        <span id="cat-inactive-stat" class="summary-chip-value">0</span>
      </span>
    </div>
  </div>
  <div class="section-divider"></div>
  <div class="categories-controls">
    <div class="categories-filter-block">
      <div class="section-eyebrow">筛选条件</div>
      <div class="categories-filter-fields categories-filter-fields-compact">
        <label>类别类型
          <select id="c_type" onchange="onTypeChanged()">
            <option value="category">元件分类</option>
            <option value="material_type">物料类型</option>
            <option value="material_attr">品牌 / 系列</option>
            <option value="grade">等级 / 属性</option>
            <option value="unit">单位</option>
            <option value="product_category">产品分类</option>
          </select>
        </label>
        <label class="categories-search-field">搜索
          <input id="c_name" placeholder="按元件分类搜索">
        </label>
      </div>
    </div>
    <div class="categories-action-block">
      <div class="section-eyebrow">快捷操作</div>
      <div class="categories-actions">
        <button class="btn primary" onclick="openCategoryModal()">新增</button>
        <button type="button" class="btn success" onclick="location.href='/api/export/categories?type='+encodeURIComponent(document.getElementById('c_type').value)">
          <span class="btn-prefix" aria-hidden="true">↗</span>
          导出 Excel
        </button>
      </div>
    </div>
  </div>
</div>
<div id="msg" class="msg"></div>
<div class="card categories-card">
  <div class="card-title-row categories-toolbar">
    <div class="categories-summary">
      <h3 id="cat-table-title">分类列表</h3>
      <span id="cat-record-total" class="record-badge record-badge-strong">共 0 条</span>
    </div>
    <div id="cat-page-summary" class="list-total-edge"></div>
  </div>
  <table class="categories-table">
    <thead>
      <tr><th>名称</th><th id="th-prefix">编码前缀</th><th>排序</th><th>状态</th><th>备注</th><th>操作</th></tr>
    </thead>
    <tbody id="cat-tbody">
      <tr><td colspan="6" class="table-state-cell">加载中...</td></tr>
    </tbody>
  </table>
  <div id="categories-mobile-list" class="categories-mobile-list" aria-live="polite"></div>
  <div class="table-pagination" id="cat-pagination">
    <button type="button" class="btn sm" id="cat-prev-page">上一页</button>
    <span id="cat-pagination-text" class="pagination-text">第 1 / 1 页</span>
    <button type="button" class="btn sm" id="cat-next-page">下一页</button>
  </div>
</div>

<div id="cat-modal" class="modal hidden">
  <div class="modal-body">
    <h3 id="cat-title">新增类别</h3>
    <form id="cat-form" class="form-grid">
      <input type="hidden" id="ct_id">
      <label>名称<input id="ct_name" required></label>
      <label id="label-prefix">编码前缀<input id="ct_code_prefix"></label>
      <label>排序<input id="ct_sort_order" type="number" value="0"></label>
      <label>状态
        <select id="ct_is_active"><option value="true">启用</option><option value="false">停用</option></select>
      </label>
      <label class="full">备注<input id="ct_remark"></label>
    </form>
    <div class="btn-row">
      <button class="btn primary" onclick="saveCategory()">保存</button>
      <button class="btn" onclick="closeCategoryModal()">取消</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/static/js/categories.js?v=20260418-1"></script>
{% endblock %}
